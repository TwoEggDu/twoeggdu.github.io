---
layout: default
---
<div class="guide-page">
  <div class="guide-shell wrapper">
    <header class="guide-header">
      <div class="guide-header-copy">
        {% if page.category %}
        <p class="guide-kicker">{{ page.category }}</p>
        {% endif %}
        <h1 class="guide-title">{{ page.title | escape }}</h1>
        {% if page.summary %}
        <p class="guide-summary">{{ page.summary }}</p>
        {% endif %}
      </div>
      <nav class="guide-topnav" aria-label="快速导航">
        {% for item in page.guide_nav %}
        <a class="guide-topnav-link" href="{{ item.href }}">{{ item.label }}</a>
        {% endfor %}
      </nav>
      <p class="guide-mode-note">桌面端请左右滑动查看各块内容，手机端会自动切回纵向。</p>
    </header>

    <main class="guide-body">
      {{ content }}
    </main>
  </div>
</div>
